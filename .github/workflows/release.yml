name: Build And Release WT Max Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: zip
          tools: composer

      - name: Update MAX SDK from upstream by Composer
        shell: bash
        run: |
          composer config repositories.webtolk-max vcs https://github.com/WebTolk/Max-platform-PHP-SDK.git
          composer update --no-interaction --no-progress --with-dependencies

      - name: Build Joomla package
        run: php build/release.php package-from-lock --package=webtolk/max --env-file="${GITHUB_ENV}"

      - name: Derive release tag from upstream version
        shell: bash
        run: |
          echo "SDK_RELEASE_TAG=v${SDK_BUILD_VERSION#v}" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: WT Max Joomla Library ${{ env.SDK_BUILD_VERSION }}
          tag_name: ${{ env.SDK_RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: dist/*.zip
