name: Build And Release WT Max Package

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Необязательная версия Joomla-пакета для ручного хотфикса, например 0.1.0.1. Если оставить пустым, будет использована версия апстримного SDK из composer.lock.'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: zip
          tools: composer

      - name: Update MAX SDK from upstream by Composer
        shell: bash
        run: |
          composer config repositories.webtolk-max vcs https://github.com/WebTolk/Max-platform-PHP-SDK.git
          composer update --no-interaction --no-progress --with-dependencies

      - name: Build Joomla package
        shell: bash
        run: |
          command=(php build/release.php package-from-lock --package=webtolk/max --env-file="${GITHUB_ENV}")

          if [ -n "${{ inputs.package_version }}" ]; then
            command+=(--version="${{ inputs.package_version }}")
          fi

          "${command[@]}"

      - name: Derive release tag from package version
        shell: bash
        run: |
          echo "PACKAGE_RELEASE_TAG=v${PACKAGE_BUILD_VERSION#v}" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: WT Max Joomla Library ${{ env.PACKAGE_BUILD_VERSION }}
          tag_name: ${{ env.PACKAGE_RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: dist/*.zip
