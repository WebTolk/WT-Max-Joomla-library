PKG_LIB_WTMAX_WHATS_NEW="<h3>v.__DEPLOY_VERSION__ What's new?</h3><p>The library now includes a Joomla 5+ <code>ModalSelect</code> field for choosing an available MAX chat directly in your extension settings.</p><p>The WT Max package is ready to use: enable the <code>System - WT Max</code> plugin, enter the Max bot token in the plugin parameters, and check the connection status in the <code>Connection status</code> field.</p><p><a href=\"index.php?option=com_plugins&view=plugins&filter[search]=WT Max\">Go to the integration plugin.</a></p>"
