PKG_LIB_WTMAX_WHATS_NEW="<h3>v.__DEPLOY_VERSION__ Что нового?</h3><p>В библиотеку добавлено поле Joomla 5+ <code>ModalSelect</code> для выбора доступного чата MAX прямо в настройках вашего расширения.</p><p>Пакет WT Max готов к работе: включите системный плагин <code>System - WT Max</code>, укажите токен бота Max в параметрах плагина и проверьте статус подключения в поле <code>Connection status</code>.</p><p><a href=\"index.php?option=com_plugins&view=plugins&filter[search]=WT Max\">Перейти к плагину интеграции.</a></p>"
